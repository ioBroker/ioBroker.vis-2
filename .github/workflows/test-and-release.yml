# This is a composition of lint and test scripts
# Make sure to update this file along with the others

name: Test and Release

# Run this job on all pushes and pull requests
# as well as tags with a semantic version
on:
    push:
        branches:
            - '*'
        tags:
            # normal versions
            - 'v?[0-9]+.[0-9]+.[0-9]+'
            # pre-releases
            - 'v?[0-9]+.[0-9]+.[0-9]+-**'
    pull_request: {}

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
    group: ${{ github.ref }}
    cancel-in-progress: true

jobs:
    adapter-tests-gui:
        if: contains(github.event.head_commit.message, '[skip ci]') == false
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js 24.x
              uses: actions/setup-node@v4
              with:
                  node-version: 24.x

            # Cache the Puppeteer browser downloads (chrome-headless-shell) keyed by the
            # lockfiles. On a hit the postinstall download is skipped; on a miss the browser
            # is installed explicitly below. This avoids the "folder exists but executable
            # missing" half-cache failure mode that Puppeteer's own postinstall does not
            # repair (it sees the directory and bails out as if already installed).
            - name: Cache Puppeteer browsers
              id: puppeteer-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/puppeteer
                  # Bump the version suffix whenever the install behaviour changes.
                  # Lockfile hash covers Puppeteer version bumps automatically.
                  key: puppeteer-v3-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

            - name: Install Monorepo
              run: npm run install-monorepo
              env:
                  # Skip Puppeteer's postinstall ALWAYS. The `install-monorepo` script
                  # runs four chained `npm i` invocations; the runner-image-bundled
                  # half-cache plus a race in the postinstall's parallel chrome /
                  # chrome-headless-shell downloads cause one invocation to leave a
                  # "folder exists but executable missing" state that the next
                  # invocation's @puppeteer/browsers DefaultProvider bails out on.
                  # The controlled install below avoids this entirely.
                  PUPPETEER_SKIP_DOWNLOAD: 'true'

            - name: Install Chrome for Puppeteer (cache miss)
              if: steps.puppeteer-cache.outputs.cache-hit != 'true'
              # Use Puppeteer's own CLI without a browser argument — this is the
              # documented way (https://pptr.dev/contributing) to install exactly the
              # browser versions puppeteer.launch() resolves at test time. The CLI
              # internally knows the right PUPPETEER_REVISIONS without us having to
              # parse them (revisions.js is gated behind the package's exports map
              # in puppeteer 24.x and is no longer require()-able from outside).
              # Wipe any stale half-cache from the runner image first.
              run: |
                  rm -rf "$HOME/.cache/puppeteer"
                  npx --yes puppeteer browsers install
                  echo '--- ~/.cache/puppeteer after install ---'
                  ls -la "$HOME/.cache/puppeteer" 2>/dev/null || echo '(missing)'
                  find "$HOME/.cache/puppeteer" -maxdepth 4 -name 'chrome*' -type d 2>/dev/null
                  echo '--- puppeteer.executablePath() ---'
                  node -e "console.log(require('puppeteer').executablePath())"

            - name: Build
              run: NODE_OPTIONS=--max_old_space_size=8192 npm run build

            - name: Test TypeScript
              run: npm run check-ts -w packages/iobroker.vis-2

            - name: Run local tests
              run: npm run test-gui -w packages/iobroker.vis-2

            - name: Archive screenshots
              if: always()
              # if: failure()
              uses: actions/upload-artifact@v4
              with:
                  path: packages/iobroker.vis-2/tmp/screenshots/**/*.png
                  retention-days: 3

    # Deploys the final package to NPM
    deploy:
        needs: [adapter-tests-gui]

        # Trigger this step only when a commit on master is tagged with a version number
        if: |
            contains(github.event.head_commit.message, '[skip ci]') == false &&
            github.event_name == 'push' &&
            startsWith(github.ref, 'refs/tags/')
        runs-on: macos-latest # ubuntu-latest has too few RAM

        permissions:
            contents: write
            id-token: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  ref: 'master'

            - name: Use Node.js 24.x
              uses: actions/setup-node@v4
              with:
                  node-version: 24.x
                  registry-url: 'https://registry.npmjs.org'

            - name: Extract the version and commit body from the tag
              id: extract_release
              # The body may be multiline; therefore, we need to escape some characters
              run: |
                  VERSION="${{ github.ref }}"
                  VERSION=${VERSION##*/}
                  VERSION=${VERSION##*v}
                  echo "::set-output name=VERSION::$VERSION"
                  BODY=$(git show -s --format=%b)
                  BODY="${BODY//'%'/'%25'}"
                  BODY="${BODY//$'\n'/'%0A'}"
                  BODY="${BODY//$'\r'/'%0D'}"
                  echo "::set-output name=BODY::$BODY"

            - name: Install Dependencies
              run: npm run install-monorepo
              env:
                  # Deploy job doesn't run GUI tests, so skip the Puppeteer browser download
                  # entirely (saves ~30 MB + avoids the same half-cache failure mode).
                  PUPPETEER_SKIP_DOWNLOAD: 'true'

            - name: Create a clean build
              run: npm run build

            - name: Publish package to npm
              env:
                  VERSION: ${{ steps.extract_release.outputs.VERSION }}
                  NPM_CONFIG_PROVENANCE: true
              run: |
                  npm i npm@10 -g

                  git add .
                  git config --global user.email "dogafox@gmail.com"
                  git config --global user.name "Github Action"
                  git commit -m "v${VERSION}" && npx lerna version ${VERSION} --no-push --exact --no-commit-hooks --yes --amend --force-publish || npx lerna version ${VERSION} --exact --no-push --no-commit-hooks --yes --force-publish

                  git status

                  npx lerna publish from-package --yes

            - name: Create Github Release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref }}
                  release_name: Release v${{ steps.extract_release.outputs.VERSION }}
                  draft: false
                  # Prerelease versions create pre-releases on GitHub
                  prerelease: ${{ contains(steps.extract_release.outputs.VERSION, '-') }}
                  body: ${{ steps.extract_release.outputs.BODY }}

            - name: Notify Sentry.io about the release
              run: |
                  npm i -g @sentry/cli
                  export SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
                  export SENTRY_URL=https://sentry.iobroker.net
                  export SENTRY_ORG=iobroker
                  export SENTRY_PROJECT=iobroker-vis-2
                  export SENTRY_VERSION=iobroker.vis-2@${{ steps.extract_release.outputs.VERSION }}
                  export SENTRY_RELEASE=${{ steps.extract_release.outputs.VERSION }}
                  sentry-cli releases new $SENTRY_VERSION
                  sentry-cli releases finalize $SENTRY_VERSION
                  sentry-cli sourcemaps inject ./www
                  sentry-cli sourcemaps upload ./www

              # Add the following line BEFORE finalize if repositories are connected in Sentry
              # sentry-cli releases set-commits $SENTRY_VERSION --auto

              # Add the following line BEFORE finalize if sourcemap uploads are needed
              # sentry-cli releases files $SENTRY_VERSION upload-sourcemaps build/
